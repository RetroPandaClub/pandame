name: Install Playwright

description: |
  Install Playwright browsers (and the matching system deps) with a cache
  keyed on the resolved `@playwright/test` version. On a cache hit we only
  re-run `playwright install-deps` to bring in any apt packages the
  browsers need; on a miss we do the full `playwright install --with-deps`.

runs:
  using: composite
  steps:
    - name: Resolve Playwright version
      id: playwright-version
      shell: bash
      run: |
        version="$(node -e "console.log(require('@playwright/test/package.json').version)")"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers + system deps
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --with-deps

    - name: Install Playwright system deps (cache hit)
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx playwright install-deps
