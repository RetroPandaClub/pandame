name: E2E

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  merge_group:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-e2e-changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.change.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect E2E-relevant changes
        id: change
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            relevant:
              - 'e2e/**'
              - 'src/**'
              - 'static/**'
              - 'scripts/**'
              - 'playwright.config.ts'
              - 'juno.config.ts'
              - 'juno.dev.config.ts'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'package.json'
              - 'package-lock.json'
              - '.node-version'
              - '.github/workflows/e2e.yml'
              - '.github/actions/prepare/**'

  e2e:
    needs: [check-e2e-changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    if: >-
      github.event_name != 'pull_request' ||
      needs.check-e2e-changes.outputs.changed == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    env:
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Print Chrome version
        run: google-chrome --version || true

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  e2e-pass:
    if: always()
    needs: [check-e2e-changes, e2e]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Cleared for merging
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
          CHANGED: ${{ needs.check-e2e-changes.outputs.changed }}
        run: |
          if [[ "$E2E_RESULT" == "success" ]]; then
            echo "E2E passed."
          elif [[ "$E2E_RESULT" == "skipped" && "$CHANGED" == "false" ]]; then
            echo "E2E skipped — no E2E-relevant changes detected."
          else
            echo "E2E did not pass (result=$E2E_RESULT, changed=$CHANGED)."
            exit 1
          fi
