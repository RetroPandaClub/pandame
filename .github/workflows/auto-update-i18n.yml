name: Auto Update i18n

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/lib/i18n/*'
      - 'src/lib/types/i18n.d.ts'

permissions: {}

jobs:
  auto_update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        if: vars.BOT_APP_ID != '' && vars.BOT_APP_INSTALLATION_ID != ''
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Run i18n script
        run: npm run i18n

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit i18n
        if: steps.check_changes.outputs.changes_detected == 'true' && steps.app-token.outputs.token != ''
        uses: ./.github/actions/add-and-commit
        with:
          message: '🤖 Updated i18n files'
          token: ${{ steps.app-token.outputs.token }}
