name: Update E2E Snapshots

on:
  workflow_dispatch:

permissions: {}

jobs:
  update_snapshots:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Fail if branch is main
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          echo "This workflow should not be triggered on main"
          exit 1

      - name: Generate GitHub App token
        id: app-token
        if: vars.BOT_APP_ID != '' && vars.BOT_APP_INSTALLATION_ID != ''
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright snapshot update
        run: npm run e2e:snapshots

      - name: Commit Playwright updated snapshots
        if: steps.app-token.outputs.token != ''
        uses: ./.github/actions/add-and-commit
        with:
          add: e2e
          message: '🤖 Update snapshots'
          token: ${{ steps.app-token.outputs.token }}
