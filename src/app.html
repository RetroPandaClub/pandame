<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#632AE8" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1A1736" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="Trustless escrow on the Internet Computer." />

		<title>PandaMe</title>

		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32.png" type="image/png" sizes="32x32" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" sizes="180x180" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

		<link
			rel="preload"
			href="/fonts/poppins-regular.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/poppins-semibold.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link rel="preload" href="/fonts/poppins-bold.woff2" as="font" type="font/woff2" crossorigin />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-bg text-default">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
